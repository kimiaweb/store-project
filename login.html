<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود</title>

    <style>
        
         @font-face {
            font-family:"BYEKAN" ;
            src: url("BYekan.ttf");
        }
        
            
        *{
            box-sizing: border-box;
            font-family: "BYEKAN";
        }
        body{
            
            background-color: rgb(138, 133, 133);
            color: white;
            
            position: relative;
            
            
        }
         #div1{
            width: 50%;
            height: 60px;
            position: absolute;
            top:40px ;
            right: 25%;
            background-color: rgb(112, 109, 109);
            border-radius: 10px;
            text-align: center;
            font-size: 20px;
            font-weight:bold ;
        }

        form{
            position:relative;
            top: 120px;
            right: 25%;
            width: 50%;
            height: 400px;
            background-color: rgb(73, 50, 156);
            border-radius: 10px;
            
            
        }
        #loginphone,#loginpass{

            position: absolute;
            left: 30%;
            border-radius: 5px;
            border: transparent;
            width: 20%;
            
            
        }
        #loginpass:focus,#loginphone:focus{
            outline: none;
        }
        .labels{
            position: absolute;
            right: 10%;
            
        }
        button{
            position: absolute;
            left: 10%;
            width: 60px;
            height: 40px;
            border-bottom-right-radius: 25%;
            border-top-right-radius: 25%;
            border-bottom-left-radius: 5px;
            border-top-left-radius: 5px;

        }
        button:hover{
           color:rgb(73, 50, 156) ;
           font-weight: bold; 
        }
        #mssg{
            display: none;
            position: absolute;
            right: 5px;

        }
        







    </style>
</head>
<body>
     <div id="div1">
        <p>ورود</p>
    </div>
<form>
    <br>
    <br>
    

    

    <label class="labels" for="fphone">شماره تلفن:</label>
    <input id="loginphone" type="tel" name="" placeholder="09121234567" >
    <br>
    <br>


   


    <label class="labels" for="fpass">پسورد:</label>
    <input id="loginpass" type="password" >
    <br>
    <br>

    <button type="submit" onclick="loginUser(event)">ورود</button>
    <div id="mssg"> اطلاعات شما اشتباه است.اگر هنوز ثبت نام نکرده اید<a href="signin.html">کلیک</a> کنید.</div>
</form>

<script>
    

    function loginUser(event){
        event.preventDefault()
        const loginphone=document.getElementById("loginphone").value 
        const storedPhone=localStorage.getItem('ph')
        const message=document.getElementById("mssg")

        const loginpass=document.getElementById("loginpass").value
        const storedPass=localStorage.getItem('p')
        if(loginphone && loginpass){
            if(loginphone && storedPhone && loginphone=== storedPhone && loginpass && storedPass && loginpass===storedPass){
            
            window.location.href="welcome.html"
            } else {
            message.style.display="block"
            document.getElementById("loginpass").value=""
            }

        } else {
            alert("شماره تلفن و رمز عبور خود را وارد کنید")
            
         
        }
        

    }





</script>

    
</body>
</html>
