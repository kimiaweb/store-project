    <script>
     
function getCart() {
    const cart = sessionStorage.getItem(getCartKey());
    return cart ? JSON.parse(cart) : [];
}

function renderCartItems() {
   const cartItems = getCart();
    const cartItemsContainer = document.getElementById('cart-items');
    const totalPriceElement = document.getElementById('total-price');
    const emptyCartMessage = document.getElementById('empty-cart');
    const submitButton=document.getElementById("submit")
        
    cartItemsContainer.innerHTML = '';
    totalPriceElement.innerHTML = '';

    let totalPrice = 0;
    let totalBeforeDiscount = 0;

    if (cartItems.length === 0) {
        emptyCartMessage.style.display = 'block';
        submitButton.style.display="none"
        return;
    } else {
        emptyCartMessage.style.display = 'none';
        submitButton.style.display='block'
    }
    
    let paymentHTML = "";

    cartItems.forEach((item, index) => {

        const beforeDiscountPrice = item.price * item.quantity;
        const afterDiscountPrice = item.aftersale * item.quantity;

        totalPrice += afterDiscountPrice;
        totalBeforeDiscount += beforeDiscountPrice;

        cartItemsContainer.innerHTML += `
        
    <div style="width:700px; height:180px; overflow-y:auto;
    display:flex; margin-right:30px; margin-left:30px; margin-top:50px;">

        <div class="cart-item">
                <img src="${item.image}" alt="${item.name}" 
                style="width: 100px; height: 100px; margin-right: 10px; border-radius:5px;">
         </div>

        <div style="text-align:center; color:rgb(70, 14, 224); margin-right:10px;">
                <h4>${item.name}</h4>
                <p style="color:rgb(70, 69, 69);">
                کد محصول:
                ${item.id}
                </p>
                <p style="color:rgb(70, 69, 69);"> رنگ:
                    ${item.color}
                    ،
                    سایز:

                    ${item.size}

                     
                    </p>
                    
        </div>

        <div style="flex-grow:5; font-size:14px; display:flex; flex-direction:column; align-items:flex-end; text-align:center;">  

                <div style="display:flex;">

            <div style="display:flex; align-items:center; margin-left:10px; font-size:12px;">
                 
                   <p style="background-color:rgb(70, 14, 224); border-radius:50%; padding-top:3px; padding-bottom:3px; ">
                   % ${Math.round(((item.price -item.aftersale)/item.price)*100)}
                   </p>
                
            </div> 

            <div>

                <p style="color:black;">
                ${item.aftersale} تومان
                </p>


                <p style="font-size:10px; color:gray;">
                <del>${item.price} تومان</del>
                </p>
                </div>

                

            </div>

                
            <div class="cart-controls" style=" color:black;background-color:rgb(151, 140, 180); padding:10px; border-radius:10px;width:140px;margin-right:30px;">

                
                <button style="background-color:transparent; border:transparent; cursor:pointer;" onclick="updateQuantity('${item.id}','${item.color}','${item.size}',  1)">+</button>
                <span>${item.quantity}</span>
                <button style="background-color:transparent; border:transparent; cursor:pointer;" onclick="updateQuantity('${item.id}','${item.color}','${item.size}', -1)">-</button>

                

                <button style="cursor:pointer;" onclick="removeFromCart('${item.id}','${item.color}','${item.size}')">
                <img src="satl ashqal.svg" style="width:20px; height:20px;">
                </button>

            </div>

        </div>
    </div>    

           

        
        `;

        paymentHTML += `

        <div style="display:flex; justify-content:space-between; margin-right:25px ; margin-left:25px; color:white; overflow:auto;">
        <p>
        قیمت کالا 0${index + 1} 
        </p>
        <p>
         ${afterDiscountPrice} تومان
         </p>
         </div>

        `;
    });

    const totalDiscount = totalBeforeDiscount - totalPrice;


    totalPriceElement.innerHTML = `

    ${paymentHTML}

    <div style="color:white;display:flex; justify-content:space-between; margin-left:18px; margin-right:25px;">

    <p>
    سود شما از این خرید
    <br>
    <br>
     مجموعه اقلام
    </p>

    <p>
   
    ${totalDiscount} تومان
    <br>
    <br>
    ${totalPrice} تومان
    </p>

    </div>

    `;

}


const menu = document.getElementById("menu-options");
const senoqte = document.getElementById("senoqte");

senoqte.addEventListener("click", function (e) {

    }else{

});

    menu.style.display = "none";
});
function clearCart() {

    if(confirm("آیا از پاک کردن همه محصولات مطمئن هستید؟")){

        sessionStorage.removeItem(getCartKey());

        renderCartItems();

        document.getElementById("menu-options").style.display = "none";
    }
}


function updateQuantity(id, color, size, change) {

    const cart = getCart();

    const itemIndex = cart.findIndex(
        item =>
            item.id === id &&
            item.color === color &&
            item.size === size
    );

    if (itemIndex > -1) {

        cart[itemIndex].quantity += change;

        if (cart[itemIndex].quantity <= 0) {
            cart.splice(itemIndex, 1);
        }

        saveCart(cart);


        renderCartItems();
    }
}

function removeFromCart(id, color, size) {

    const cart = getCart();

    const updatedCart = cart.filter(
        item =>
            !(
                item.id === id &&
                item.color === color &&
                item.size === size
            )
    );

    saveCart(updatedCart);

    renderCartItems();

}


function saveCart(cart) {

    sessionStorage.setItem(getCartKey(), JSON.stringify(cart));
}

document.addEventListener('DOMContentLoaded', renderCartItems);

function getCartKey(){
    const phone=localStorage.getItem('ph')
    
    return `shoppingCart_${phone}`
}

        function displaySearchResults() {
            const searchInput = document.getElementById("search").value.toLowerCase()
            const resultsDiv = document.getElementById("results")

            
            const filteredProducts = allProducts.filter(product =>
                product.name.toLowerCase().includes(searchInput)
            )
            const uniqueProducts=[]
            filteredProducts.forEach(product=>{
                const exists = uniqueProducts.find(
                    item=> item.name===product.name
                )
                if(!exists){
                    uniqueProducts.push(product)
                }
            })

            let htmlContent = ""

            if (filteredProducts.length > 0) {
                uniqueProducts.forEach(product => {
                    htmlContent += ` 
                        <a  href="${product.link}"style="text-decoration:none;">
                            <div id="searchproduct" style=" margin-top:5px;">
                        <img src="${product.image}" alt="${product.name}" style="width:80px; height:80px;border-radius:5px;
                        margin-top:25px; margin-left:10px; margin-right:10px;">
                         نام: ${product.name}
                         
                             کد: ${product.id}
                             
                     <br> <br>
                     
                     </div>
                        </a>
                    
                     
                     `;
                    
                   
                });
            } else {
                htmlContent = "موردی یافت نشد."
            }

            resultsDiv.innerHTML = htmlContent

function changeInformation(){
    
    const changedname = document.getElementById("changename").value
    const changednumber = document.getElementById("changenumber").value
    const changedemail = document.getElementById("changeemail").value
    const changedpass2 = document.getElementById("changepass2").value
    const changedpass = document.getElementById("changepass").value
    let updated = false

    if (changedname){
       
        localStorage.setItem('n', changedname)
        updated=true
       
        
    }
    if (changednumber){
        localStorage.setItem('ph', changednumber)
        updated = true
    } 
    if (changedemail){
        localStorage.setItem('e', changedemail)
        updated = true
    } 

    
    
    if (changedpass && changedpass2){
        if(changedpass.length<7 && changedpass2.length<7 ){
            alert("رمز عبور انتخابی باید بیش از 7 کاراکتر داشته باشد.")
            return
        }
        if (changedpass === changedpass2 ){
            localStorage.setItem('p', changedpass2)
            
            
        } else if (changedpass !== changedpass2) {
            alert("رمز جدید و تکرار آن مطابقت ندارند!")
            return
        }
    } else if((changedpass && changedpass2=="") || (changedpass2&&changedpass=="")) {
        alert("هر دو فیلد مربوط به رمز را باید پر کنید")
        return

    }
    
    if (updated) {
        
        const welcome = document.getElementById("welcomemsg")
        const newName = localStorage.getItem('n')
        if (newName) {
            welcome.textContent = newName
        }
        alert("اطلاعات شما با موفقیت بهروزرسانی شد!")
        
        
        document.getElementById("changename").value = ""
        document.getElementById("changenumber").value = ""
        document.getElementById("changeemail").value = ""
        document.getElementById("changepass").value = ""
        document.getElementById("changepass2").value = ""
        
        hidechangeinfo()
    
    }

    
    
}
